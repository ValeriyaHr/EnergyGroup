<div class="engReqModal" id="engReqModal" aria-hidden="true">
    <div class="engReqModal__backdrop" data-eng-request-close></div>
    <div class="engReqModal__dialog" role="dialog" aria-modal="true" aria-labelledby="engReqModalTitle">
        <button class="engReqModal__close" type="button" aria-label="Закрити" data-eng-request-close></button>
        <h2 class="engReqModal__title" id="engReqModalTitle">ЗАПРОСИТИ РОЗРАХУНОК СИСТЕМИ</h2>

        <form class="engReqModal__form" action="#" method="post">
            <div class="engReqModal__grid2">
                <label class="engReqModal__field">
                    <span class="engReqModal__srOnly">Ім'я</span>
                    <input class="engReqModal__input" type="text" name="eng_name" placeholder="ІМ'Я *" required>
                </label>
                <label class="engReqModal__field">
                    <span class="engReqModal__srOnly">Прізвище</span>
                    <input class="engReqModal__input" type="text" name="eng_surname" placeholder="ПРІЗВИЩЕ *" required>
                </label>
            </div>

            <label class="engReqModal__field">
                <span class="engReqModal__srOnly">Email</span>
                <input class="engReqModal__input" type="email" name="eng_email" placeholder="EMAIL *" required>
            </label>

            <label class="engReqModal__field">
                <span class="engReqModal__srOnly">Телефон</span>
                <input class="engReqModal__input" type="tel" name="eng_phone" placeholder="ТЕЛЕФОН" inputmode="tel">
            </label>

            <label class="engReqModal__field">
                <span class="engReqModal__srOnly">Опис запиту</span>
                <textarea class="engReqModal__input engReqModal__input--area" name="eng_message" placeholder="ОПИШІТЬ, ЧИМ МИ МОЖЕМО ВАМ ДОПОМОГТИ *" required></textarea>
            </label>

            <label class="engReqModal__agree">
                <input class="engReqModal__check" type="checkbox" name="eng_agree" required>
                <span>Даю згоду на обробку персональних даних</span>
            </label>

            <button class="engReqModal__submit" type="submit">НАДІСЛАТИ ЗАПИТ</button>
        </form>
    </div>
</div>
