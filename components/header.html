<!-- ===== HEADER ===== -->
<header class="header" id="top">
    <div class="container grid12 header__inner">
        <div class="header__left">
            <button class="header__burger" type="button" aria-label="Menu" aria-controls="menuOverlay" aria-expanded="false" >
                <picture>
                    <source media="(max-width: 768px)" srcset="/img/ui/burger-mobile.svg">
                    <img src="/img/ui/burger.svg" alt="" width="24" height="24">
                </picture>
            </button>

            <div class="header__lang">
                <a href="./index.html" class="is-active">UA</a>
                <span class="light-grey">|</span>
                <a href="./en/index.html">EN</a>
            </div>

            <div class="header__contacts">
                <a href="tel:+380443901015">+38 (044) 390-10-15</a>
                <a class="is-underline" href="mailto:info@llc-peg.com">info@llc-peg.com</a>
            </div>
        </div>

        <a class="header__logo" href="./index.html" aria-label="Prime Energy Group">
            <img src="/img/logos/logo.png"
                 alt="Prime Energy Group"
                 width="103"
                 height="48"
                 style="height:auto;">
        </a>

        <div class="header__right">
            <button class="header__ctaSecondary btn btn--secondary btn--drift" type="button" data-eng-request-open data-eng-request-target="request_modal_prev">CONSULT WITH ENGINEER</button>
            <a class="btn btn--primary btn--brackets hero__cta"   href="index.html#contacts">КОНСУЛЬТАЦІЯ</a>

        </div>
    </div>
</header>

{{> menu}}
