name: Deploy to server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      server_command:
        description: "Custom command to run on server (optional)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            if [ -n "${{ github.event.inputs.server_command }}" ]; then
              ${{ github.event.inputs.server_command }}
            else
              cd /var/www/energy.firm.kiev.ua
              git pull origin main
              npm ci
              npm run build
            fi
